<!DOCTYPE html>
<html lang="en">
<head>
    <base href="/">
    <link rel="stylesheet" href="/theme.css">
    <script src="/themes.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #c0c0c0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
            border-top: 6px solid #ffffff;
            border-left: 6px solid #ffffff;
            border-bottom: 6px solid #808080;
            border-right: 6px solid #808080;
        }

        .win95-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 1vh 1vw;
            box-sizing: border-box;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .inner-border {
            border-top: 4px solid #808080;
            border-left: 4px solid #808080;
            border-bottom: 4px solid #ffffff;
            border-right: 4px solid #ffffff;
        }

        .status-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1vh 1vw;
            margin-bottom: 1vh;
            height: 10vh;
            min-height: 50px;
            box-sizing: border-box;
        }

        @media (orientation: landscape) {
            .game-area {
                flex-direction: row;
            }
            .status-panel {
                flex-direction: column;
                height: 100%;
                width: 12vw;
                min-width: 60px;
                max-width: 100px;
                margin-bottom: 0;
                margin-right: 1vw;
                padding: 1vw;
            }
            .lcd-container {
                height: 5vh;
                min-height: 30px;
                width: 100%;
                justify-content: center;
            }
            #face-btn {
                width: 100%;
                height: auto;
                aspect-ratio: 1;
            }
        }

        .lcd-container {
            background-color: #000000;
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-bottom: 2px solid #ffffff;
            border-right: 2px solid #ffffff;
            height: 100%;
            padding: 4px;
            display: flex;
            box-sizing: border-box;
        }

        .lcd-container svg {
            height: 100%;
            width: auto;
        }

        #face-btn {
            height: 100%;
            aspect-ratio: 1;
            border-top: 4px solid #ffffff;
            border-left: 4px solid #ffffff;
            border-bottom: 4px solid #808080;
            border-right: 4px solid #808080;
            background-color: #c0c0c0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            font-size: max(3vh, 3vw);
            outline: none;
            cursor: pointer;
            box-sizing: border-box;
        }

        #face-btn:active {
            border-top: 4px solid #808080;
            border-left: 4px solid #808080;
            border-bottom: 4px solid #ffffff;
            border-right: 4px solid #ffffff;
            padding-top: 2px;
            padding-left: 2px;
        }

        .grid-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            background-color: #c0c0c0;
            padding: 0;
            min-height: 0; /* Important for flex child to not overflow */
            min-width: 0;
            overflow: hidden;
            container-type: size;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(var(--cols, 9), 40px);
            grid-template-rows: repeat(var(--rows, 9), 40px);
            justify-content: center;
            align-content: center;
        }

        .cell {
            width: 40px;
            height: 40px;
            box-sizing: border-box;
            background-color: #c0c0c0;
            border-top: 4px solid #ffffff;
            border-left: 4px solid #ffffff;
            border-bottom: 4px solid #808080;
            border-right: 4px solid #808080;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Verdana', 'Trebuchet MS', sans-serif;
            font-size: 24px;
            font-weight: 900;
            cursor: default;
        }

        .cell.revealed {
            border: 1px solid #808080;
            border-right: 1px solid #c0c0c0;
            border-bottom: 1px solid #c0c0c0;
            background-color: #c0c0c0;
        }
        
        .cell svg {
            width: 70%;
            height: 70%;
            pointer-events: none;
        }

        /* Cell text colors to match exactly the classic game values */
        .c1 { color: #0000ff; }
        .c2 { color: #008000; }
        .c3 { color: #ff0000; }
        .c4 { color: #000080; }
        .c5 { color: #7b0000; }
        .c6 { color: #008080; }
        .c7 { color: #000000; }
        .c8 { color: #808080; }

        .mine-hit {
            background-color: #ff0000 !important;
        }
    </style>
  <script src="/shell/presenter.js"></script>
</head>
<body>

    <div class="win95-window">
        <div class="game-area">
            <div class="status-panel inner-border">
                <div class="lcd-container" id="mines-lcd"></div>
                <button id="face-btn"></button>
                <div class="lcd-container" id="time-lcd"></div>
            </div>

            <div class="grid-panel">
                <div id="grid" class="inner-border"></div>
            </div>
        </div>
    </div>

<script>
    const config = { rows: 9, cols: 9, mines: 10 };
    
    // Exact SVGs matching Windows 95 aesthetics
    const faces = {
        normal: `🙂`,
        ooh: `😮`,
        dead: `😵`,
        win: `😎`
    };

    const icons = {
        mine: `<svg width="14" height="14" viewBox="0 0 16 16"><path d="M8 3v10M3 8h10M4.5 4.5l7 7M4.5 11.5l7-7" stroke="#000" stroke-width="1.5"/><circle cx="8" cy="8" r="3.5" fill="#000"/><rect x="6" y="6" width="2" height="2" fill="#fff"/></svg>`,
        flag: `<svg width="14" height="14" viewBox="0 0 16 16"><path d="M5 13h6v1H5zM6 12h4v1H6zM7 2v10H6V2z" fill="#000"/><path d="M7 2v6l5-3z" fill="#ff0000"/></svg>`,
        wrong: `<svg width="14" height="14" viewBox="0 0 16 16"><path d="M8 3v10M3 8h10M4.5 4.5l7 7M4.5 11.5l7-7" stroke="#000" stroke-width="1.5"/><circle cx="8" cy="8" r="3.5" fill="#000"/><rect x="6" y="6" width="2" height="2" fill="#fff"/><path d="M2 2l12 12M2 14L14 2" stroke="#ff0000" stroke-width="2"/></svg>`
    };

    // Vector implementation of classic red 7-segment displays
    const segs = {
        a: "2,1 8,1 9,2 8,3 2,3 1,2", b: "9,2 10,3 10,8 9,9 8,8 8,3",
        c: "9,10 10,11 10,16 9,17 8,16 8,11", d: "2,17 8,17 9,18 8,19 2,19 1,18",
        e: "1,10 2,11 2,16 1,17 0,16 0,11", f: "1,2 2,3 2,8 1,9 0,8 0,3",
        g: "2,9 8,9 9,10 8,11 2,11 1,10"
    };
    const numMap = [
        ['a','b','c','d','e','f'],['b','c'],['a','b','g','e','d'],['a','b','g','c','d'],
        ['f','g','b','c'],['a','f','g','c','d'],['a','f','e','d','c','g'],['a','b','c'],
        ['a','b','c','d','e','f','g'],['a','b','c','d','f','g']
    ];

    function drawLcd(str) {
        return str.split('').map(char => {
            let out = '<svg viewBox="-1 -2 12 23" width="12" height="21" style="display:inline-block;">';
            for (let s in segs) out += `<polygon points="${segs[s]}" fill="#4a0000"/>`;
            if (char === '-') {
                out += `<polygon points="${segs.g}" fill="#ff0000"/>`;
            } else if (char !== ' ') {
                let n = parseInt(char);
                if (!isNaN(n)) {
                    numMap[n].forEach(s => out += `<polygon points="${segs[s]}" fill="#ff0000"/>`);
                }
            }
            out += '</svg>';
            return out;
        }).join('');
    }

    // Synthesized beep-boops — Web Audio oscillators only, no audio assets (nothing to license).
    // Square waves on purpose: that's the Win95 timbre. Context is lazy + gesture-created (WebView rule).
    const Sfx = (() => {
        let ctx = null;
        function ac() {
            if (!ctx) { try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch { return null; } }
            if (ctx && ctx.state === 'suspended') ctx.resume();
            return ctx;
        }
        function tone(freq, dur = 0.05, type = 'square', vol = 0.06, when = 0, slideTo = 0) {
            const a = ac(); if (!a) return;
            const t0 = a.currentTime + when;
            const osc = a.createOscillator(), g = a.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, t0);
            if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
            g.gain.setValueAtTime(vol, t0);
            g.gain.exponentialRampToValueAtTime(0.0005, t0 + dur);
            osc.connect(g); g.connect(a.destination);
            osc.start(t0); osc.stop(t0 + dur + 0.02);
        }
        return {
            beep:   () => tone(660, 0.045),                                   // reveal
            boop:   () => tone(330, 0.06),                                    // flag planted
            unboop: () => tone(220, 0.05, 'square', 0.05),                    // flag pulled
            reset:  () => { tone(440, 0.05); tone(660, 0.05, 'square', 0.06, 0.06); },
            win:    () => [523, 659, 784, 1047].forEach((f, n) => tone(f, 0.09, 'square', 0.07, n * 0.09)),
            lose:   () => tone(280, 0.45, 'sawtooth', 0.08, 0, 60),           // descending buzz
        };
    })();

    // Engine State
    let cells = [];
    let state = {
        gameOver: false,
        firstClick: true,
        flags: 0,
        time: 0,
        timerId: null,
        activeClickIdx: null
    };

    let elFace = document.getElementById('face-btn');
    let elGrid = document.getElementById('grid');
    let elMinesLcd = document.getElementById('mines-lcd');
    let elTimeLcd = document.getElementById('time-lcd');

    function init() {
        cells = [];
        state.gameOver = false;
        state.firstClick = true;
        state.flags = 0;
        state.time = 0;
        if(state.timerId) clearInterval(state.timerId);
        state.timerId = null;
        
        elGrid.innerHTML = '';
        elFace.innerHTML = faces.normal;
        elGrid.style.setProperty('--cols', config.cols);
        elGrid.style.setProperty('--rows', config.rows);
        elGrid.style.setProperty('--ratio', `${config.cols} / ${config.rows}`);
        updateLCD();

        for (let i = 0; i < config.rows * config.cols; i++) {
            cells.push({ index: i, mine: false, revealed: false, flagged: false, nbs: 0 });
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = 'cell-' + i;
            cell.dataset.i = i;
            elGrid.appendChild(cell);
        }
    }

    function placeMines(safeIdx) {
        let placed = 0;
        while(placed < config.mines) {
            let i = Math.floor(Math.random() * cells.length);
            if (!cells[i].mine && i !== safeIdx) {
                cells[i].mine = true;
                placed++;
            }
        }
        for(let i=0; i<cells.length; i++) {
            cells[i].nbs = getNeighbors(i).filter(nb => cells[nb].mine).length;
        }
    }

    function getNeighbors(i) {
        let nbs = [];
        let r = Math.floor(i / config.cols);
        let c = i % config.cols;
        for(let dr=-1; dr<=1; dr++){
            for(let dc=-1; dc<=1; dc++){
                if(dr===0 && dc===0) continue;
                let nr = r+dr, nc = c+dc;
                if(nr>=0 && nr<config.rows && nc>=0 && nc<config.cols) {
                    nbs.push(nr * config.cols + nc);
                }
            }
        }
        return nbs;
    }

    function updateLCD() {
        let remain = config.mines - state.flags;
        let pSign = remain < 0 ? '-' : '0';
        let sRemain = Math.abs(remain).toString().padStart(remain < 0 ? 2 : 3, pSign);
        elMinesLcd.innerHTML = drawLcd(sRemain);

        let sTime = Math.min(999, state.time).toString().padStart(3, '0');
        elTimeLcd.innerHTML = drawLcd(sTime);
    }

    function startTimer() {
        state.timerId = setInterval(() => {
            state.time++;
            updateLCD();
        }, 1000);
    }

    function reveal(i) {
        let c = cells[i];
        if(c.revealed || c.flagged) return;
        c.revealed = true;
        renderCell(i);

        if(c.mine) {
            triggerGameOver(false, i);
            return;
        }
        
        if(c.nbs === 0) {
            getNeighbors(i).forEach(nb => {
                if(!cells[nb].revealed && !cells[nb].flagged) reveal(nb);
            });
        }
        
        checkWin();
    }

    function checkWin() {
        let unrevealed = cells.filter(c => !c.revealed).length;
        if(unrevealed === config.mines) {
            triggerGameOver(true);
        }
    }

    function triggerGameOver(win, triggerIdx) {
        state.gameOver = true;
        clearInterval(state.timerId);
        
        if(win) {
            Sfx.win();
            elFace.innerHTML = faces.win;
            state.flags = config.mines;
            updateLCD();
            cells.forEach((c, i) => {
                if(!c.revealed && c.mine && !c.flagged) {
                    c.flagged = true;
                    renderCell(i);
                }
            });
        } else {
            Sfx.lose();
            elFace.innerHTML = faces.dead;
            document.getElementById('cell-' + triggerIdx).classList.add('mine-hit');
            cells.forEach((c, i) => {
                if(c.mine && !c.flagged && i !== triggerIdx) {
                    c.revealed = true;
                    renderCell(i);
                }
                if(!c.mine && c.flagged) {
                    let el = document.getElementById('cell-' + i);
                    el.className = 'cell revealed';
                    el.innerHTML = icons.wrong;
                }
            });
        }
    }

    function chord(i) {
        let c = cells[i];
        if(!c.revealed || c.nbs === 0) return;
        let flagCount = getNeighbors(i).filter(nb => cells[nb].flagged).length;
        if(flagCount === c.nbs) {
            getNeighbors(i).forEach(nb => {
                if(!cells[nb].revealed && !cells[nb].flagged) {
                    reveal(nb);
                }
            });
        }
    }

    function renderCell(i) {
        let c = cells[i];
        let el = document.getElementById('cell-' + i);
        if(c.revealed) {
            el.className = 'cell revealed';
            if(c.mine) el.innerHTML = icons.mine;
            else if(c.nbs > 0) {
                el.innerHTML = c.nbs;
                el.classList.add('c' + c.nbs);
            } else el.innerHTML = '';
        } else {
            el.className = 'cell';
            if(c.flagged) el.innerHTML = icons.flag;
            else el.innerHTML = '';
        }
    }

    function getCellIdx(e) {
        let tg = e.target.closest('.cell');
        return tg ? parseInt(tg.dataset.i) : null;
    }

    elGrid.addEventListener('mousedown', e => {
        if(state.gameOver) return;
        let i = getCellIdx(e);
        if(i === null) return;
        
        if(e.button === 2) {
            if(!cells[i].revealed) {
                cells[i].flagged = !cells[i].flagged;
                state.flags += cells[i].flagged ? 1 : -1;
                cells[i].flagged ? Sfx.boop() : Sfx.unboop();
                renderCell(i);
                updateLCD();
            }
        } else if(e.button === 0) {
            elFace.innerHTML = faces.ooh;
            if(!cells[i].revealed && !cells[i].flagged) {
                state.activeClickIdx = i;
                document.getElementById('cell-' + i).classList.add('revealed');
            } else if(cells[i].revealed) {
                // Chord action mapped to basic left-click on revealed number for web playability
                chord(i);
                if(!state.gameOver) Sfx.beep();
            }
        }
    });

    window.addEventListener('mouseover', e => {
        if(state.gameOver) return;
        if(e.buttons === 1) {
            let i = getCellIdx(e);
            if(i !== null && !cells[i].revealed && !cells[i].flagged) {
                state.activeClickIdx = i;
                document.getElementById('cell-' + i).classList.add('revealed');
            }
        }
    });

    window.addEventListener('mouseout', e => {
        if(state.gameOver || state.activeClickIdx === null) return;
        let i = getCellIdx(e);
        if(i === state.activeClickIdx) {
            document.getElementById('cell-' + i).classList.remove('revealed');
            state.activeClickIdx = null;
        }
    });

    window.addEventListener('mouseup', e => {
        if(state.gameOver) return;
        if(e.button === 0) {
            elFace.innerHTML = faces.normal;
            if(state.activeClickIdx !== null) {
                let i = state.activeClickIdx;
                document.getElementById('cell-' + i).classList.remove('revealed');
                state.activeClickIdx = null;
                
                if(state.firstClick) {
                    state.firstClick = false;
                    placeMines(i);
                    startTimer();
                }
                reveal(i);
                if(!state.gameOver) Sfx.beep();
            }
        }
    });

    elGrid.addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('contextmenu', e => e.preventDefault());
    
    // Bind reset to smile face
    elFace.addEventListener('click', init);
    elFace.addEventListener('click', Sfx.reset);

    const CELL_SIZE = 40;

    function resizeGrid() {
        const panelInner = document.querySelector('.grid-panel');
        const style = window.getComputedStyle(panelInner);
        const paddingX = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
        const paddingY = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);
        
        let availableW = panelInner.clientWidth - paddingX;
        let availableH = panelInner.clientHeight - paddingY;
        
        if (availableW <= 0) availableW = window.innerWidth * 0.9;
        if (availableH <= 0) availableH = window.innerHeight * 0.7;
        
        let newCols = Math.floor((availableW - 8) / CELL_SIZE);
        let newRows = Math.floor((availableH - 8) / CELL_SIZE);
        
        newCols = Math.max(5, newCols);
        newRows = Math.max(5, newRows);
        
        if (newCols !== config.cols || newRows !== config.rows || state.gameOver === undefined) {
            config.cols = newCols;
            config.rows = newRows;
            config.mines = Math.max(1, Math.floor(newCols * newRows * 0.15));
            init();
        }
    }

    let resizeTimer = null;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(resizeGrid, 200);
    });

    // Initial load
    resizeGrid();
    
    // Expose reset globally for the UI Menu
    window.resetGame = resizeGrid;
</script>
</body>
</html>
